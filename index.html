<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini posto - Geo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/0f437c02b4.js" crossorigin="anonymous"></script>
</head>

<body>

    <main>

        <header>
            <div class="content-coin header-content">
                <i class="fa-solid fa-coins"></i>
                <p>$</p>
                <div class="money">0</div>
            </div>
            <div class="content-combo header-content">
                <i class="fa-solid fa-fire"></i>
                <p>combo </p>
                <div class="combo">0</div>
            </div>
        </header>

        <section class="content-pedidos">
            <ul class="pedidos">
                <li class="item">
                    <h3>🚗 Cliente chegou</h3>
                    <p>pode colocar <span>0</span>L por favor.</p>
                </li>
            </ul>

        </section>
        <div class="display-gas">
            <div class="content-gas">
                <h1 class="quantGas2">0L</h1>
                <div class="gas">
                    <div class="gas-land"></div>
                    <div class="gas-lim"></div>
                </div>
            </div>


            <div class="content-num">
                <p class="numero">0L</p>
                <button class="bttGas">SEGURE PARA ABASTECER</button>
            </div>
            <div class="resultado"></div>
        </div>

        <section class="loja loja-lvl1">
            <div class="upgrade up-erro"></div>
            <div class="upgrade up-dinheiro"></div>
            <div class="upgrade up-"></div>
        </section>






    </main>

    <script src="main.js"></script>
</body>

</html>
